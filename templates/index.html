<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ino.digital | HD Ultra Boost</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Montserrat', sans-serif; 
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-card { text-align: center; max-width: 380px; width: 100%; }

        /* Logo Di Tengah */
        .logo-box { margin-bottom: 20px; }
        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #bc13fe; box-shadow: 0 0 20px #bc13fe; object-fit: cover; }

        h2 { font-weight: 700; margin: 10px 0; letter-spacing: 2px; color: #fff; }
        .tagline { color: #888; font-size: 0.8em; margin-bottom: 30px; text-transform: uppercase; }

        /* Style Input File */
        .file-upload { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type="file"] { width: 100%; color: #888; }

        /* Container Progress Bar (Kaya Baterai) */
        #progress-container { 
            display: none; margin: 20px 0; align-items: center; justify-content: space-between; 
        }
        .battery-bar { 
            flex: 1; height: 12px; background: #222; border-radius: 6px; 
            overflow: hidden; border: 1px solid #444; margin-right: 10px;
        }
        #progress-fill { 
            width: 0%; height: 100%; background: linear-gradient(90deg, #bc13fe, #e082ff); 
            transition: width 0.3s;
        }
        #progress-text { font-weight: bold; color: #bc13fe; min-width: 40px; }

        .btn-process { 
            background: #bc13fe; border: none; color: white; padding: 15px; 
            cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; 
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-process:disabled { background: #444; cursor: not-allowed; }

        /* Hasil */
        #hasil-foto { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; border: 2px solid #bc13fe; }
        .btn-download { 
            display: none; background: #fff; color: #000; padding: 15px; 
            text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;
        }

        footer { padding: 20px; font-size: 0.7em; color: #444; text-align: center; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="app-card">
            <div class="logo-box">
                <img src="https://files.catbox.moe/fmzx1o.png" alt="Ino.digital Logo" class="logo-img">
            </div>
            <h2>INO.DIGITAL HD</h2>
            <p class="tagline">Cloud AI Photo Enhancer</p>
            
            <div class="file-upload">
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <button id="btnUpload" class="btn-process" onclick="uploadFoto()">MULAI PROSES HD</button>
            
            <div id="progress-container">
                <div class="battery-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="progress-text">0%</div>
            </div>

            <img id="hasil-foto" src="" alt="Hasil HD">
            <a id="btn-download" href="#" download="InoDigital_HD.jpg" class="btn-download">SIMPAN KE GALERI</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <b>Ino.digital</b>. All Rights Reserved.</p>
        <p>Developed by <span style="color:#bc13fe">Ino Entrepreneur</span></p>
    </footer>

    <script>
        const socket = io();
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const btnUpload = document.getElementById('btnUpload');
        const imgHasil = document.getElementById('hasil-foto');
        const btnDownload = document.getElementById('btn-download');

        function moveProgress() {
            let width = 0;
            progressContainer.style.display = "flex";
            btnUpload.disabled = true;
            btnUpload.innerText = "Processing...";

            let id = setInterval(frame, 150); // Kecepatan ngisi
            function frame() {
                if (width >= 95) { // Berhenti di 95% sampai bot beneran kirim file
                    clearInterval(id);
                } else {
                    width++;
                    progressFill.style.width = width + '%';
                    progressText.innerText = width + '%';
                }
            }
            return id;
        }

        async function uploadFoto() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("Pilih foto dulu!");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // Jalankan animasi progress bar
            moveProgress();
            
            await fetch('/upload', { method: 'POST', body: formData });
        }

        socket.on('hasil_siap', function(data) {
            // Langsung 100% pas file diterima
            progressFill.style.width = '100%';
            progressText.innerText = '100%';
            
            setTimeout(() => {
                progressContainer.style.display = "none";
                btnUpload.disabled = false;
                btnUpload.innerText = "MULAI PROSES HD";
                
                imgHasil.src = data.url;
                imgHasil.style.display = "block";
                btnDownload.href = data.url;
                btnDownload.style.display = "block";
            }, 500);
        });
    </script>
</body>
    </html>
